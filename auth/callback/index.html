<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FutureSelf — Auth</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96' fill='none'><circle cx='48' cy='48' r='48' fill='%231B2138'/><line x1='48' y1='14' x2='48' y2='24' stroke='%23F5A623' stroke-width='4.5' stroke-linecap='round'/><line x1='35' y1='17' x2='37.5' y2='27' stroke='%23F5A623' stroke-width='4.5' stroke-linecap='round'/><line x1='61' y1='17' x2='58.5' y2='27' stroke='%23F5A623' stroke-width='4.5' stroke-linecap='round'/><line x1='25' y1='24' x2='29.5' y2='32' stroke='%23F5A623' stroke-width='4' stroke-linecap='round'/><line x1='71' y1='24' x2='66.5' y2='32' stroke='%23F5A623' stroke-width='4' stroke-linecap='round'/><rect x='38' y='36' width='6' height='22' rx='3' fill='%235BC67A'/><rect x='52' y='36' width='6' height='22' rx='3' fill='%235BC67A'/><path d='M30 66C30 66 38 76 48 76C58 76 66 66 66 66' stroke='%235BC67A' stroke-width='4.5' stroke-linecap='round'/></svg>" type="image/svg+xml">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0e1a;
      --bg-card: #111627;
      --gold: #e8b931;
      --green: #4ade80;
      --cream: #f0e6d3;
      --cream-dim: rgba(240, 230, 211, 0.6);
      --muted: #7a8194;
      --border: rgba(240, 230, 211, 0.08);
      --red: #f87171;
      --font-display: 'Fraunces', serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.7;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 56px 44px;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      margin-bottom: 28px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .subtext {
      font-size: 1rem;
      color: var(--cream-dim);
      margin-bottom: 32px;
      line-height: 1.7;
    }

    /* Spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 28px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Check icon */
    .check-icon {
      font-size: 3rem;
      color: var(--green);
      display: block;
      margin-bottom: 16px;
      line-height: 1;
    }

    /* Chrome toolbar hint */
    .toolbar-hint {
      margin: 20px 0 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .toolbar-hint-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Inline SVG illustration of Chrome toolbar */
    .toolbar-illustration {
      display: block;
      margin: 0 auto;
    }

    /* Buttons */
    .btn {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 12px;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border: none;
      text-align: center;
      text-decoration: none;
      width: 100%;
    }

    .btn-green {
      background: var(--green);
      color: #0a0e1a;
      box-shadow: 0 4px 24px rgba(74, 222, 128, 0.2);
    }

    .btn-green:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(74, 222, 128, 0.35);
    }

    .btn-green:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Password form */
    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      color: var(--cream-dim);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: rgba(240, 230, 211, 0.3);
    }

    .form-group input::placeholder {
      color: var(--muted);
    }

    .form-error {
      font-size: 0.875rem;
      color: var(--red);
      margin-bottom: 16px;
      text-align: left;
    }

    .success-note {
      font-size: 1rem;
      color: var(--green);
      line-height: 1.6;
      padding: 16px;
      background: rgba(74, 222, 128, 0.08);
      border: 1px solid rgba(74, 222, 128, 0.2);
      border-radius: 10px;
    }

    .back-link {
      display: block;
      margin-top: 20px;
      font-size: 0.875rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--cream);
    }

    @media (max-width: 480px) {
      .card {
        padding: 40px 24px;
      }

      h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Logo -->
    <div class="logo">
      <svg width="52" height="52" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="48" cy="48" r="48" fill="#1B2138"/>
        <line x1="48" y1="14" x2="48" y2="24" stroke="#F5A623" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="35" y1="17" x2="37.5" y2="27" stroke="#F5A623" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="61" y1="17" x2="58.5" y2="27" stroke="#F5A623" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="25" y1="24" x2="29.5" y2="32" stroke="#F5A623" stroke-width="4" stroke-linecap="round"/>
        <line x1="71" y1="24" x2="66.5" y2="32" stroke="#F5A623" stroke-width="4" stroke-linecap="round"/>
        <rect x="38" y="36" width="6" height="22" rx="3" fill="#5BC67A"/>
        <rect x="52" y="36" width="6" height="22" rx="3" fill="#5BC67A"/>
        <path d="M30 66C30 66 38 76 48 76C58 76 66 66 66 66" stroke="#5BC67A" stroke-width="4.5" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- Content swapped in by JS -->
    <div id="content">
      <!-- STATE C: Loading -->
      <div class="spinner"></div>
      <p class="subtext" style="color: var(--muted);">Checking your link…</p>
    </div>
  </div>

  <script>
    (function () {
      var SUPABASE_URL = 'https://odcmrhnwxzgyfodoscqw.supabase.co';
      var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kY21yaG53eHpneWZvZG9zY3F3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NzA5NTUsImV4cCI6MjA4ODM0Njk1NX0.dbTm2SsVo7iAWfoULhfRgayKBmAO8v7Y2Q-fHzvzSPQ';

      var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      var content = document.getElementById('content');

      // --- Parse URL for type param (query string or hash fragment) ---
      function getAuthParams() {
        // Supabase may put tokens in the hash (#access_token=...) or query (?code=...)
        var hash = window.location.hash.substring(1);
        var query = window.location.search.substring(1);
        var params = {};

        function parseStr(str) {
          str.split('&').forEach(function (pair) {
            var parts = pair.split('=');
            if (parts[0]) params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1] || '');
          });
        }

        if (hash) parseStr(hash);
        if (query) parseStr(query);
        return params;
      }

      // --- STATE A: Email confirmed ---
      function showSignupSuccess() {
        content.innerHTML =
          '<span class="check-icon">&#10003;</span>' +
          '<h1>You\'re confirmed! ✓</h1>' +
          '<p class="subtext">Your account is ready. Click the FutureSelf icon in your Chrome toolbar to get started.</p>' +
          '<div class="toolbar-hint">' +
            '<p class="toolbar-hint-label">Find the extension here</p>' +
            toolbarSVG() +
          '</div>' +
          '<a href="chrome://extensions" target="_blank" rel="noopener" class="btn btn-green">Open Chrome Extensions</a>' +
          '<a href="../../index.html" class="back-link">Back to homepage</a>';
      }

      // SVG illustration: a simplified Chrome toolbar with a highlighted puzzle-piece area
      function toolbarSVG() {
        return '<svg class="toolbar-illustration" width="300" height="52" viewBox="0 0 300 52" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Chrome toolbar showing extension icon location">' +
          // Browser chrome bar background
          '<rect width="300" height="52" rx="8" fill="#1e2436"/>' +
          // Address bar
          '<rect x="40" y="14" width="180" height="24" rx="12" fill="#0a0e1a" stroke="rgba(240,230,211,0.1)" stroke-width="1"/>' +
          // URL text placeholder
          '<rect x="56" y="22" width="100" height="8" rx="4" fill="rgba(240,230,211,0.12)"/>' +
          // Favicon dot in address bar
          '<circle cx="52" cy="26" r="4" fill="rgba(240,230,211,0.2)"/>' +
          // Extension area (right side) — highlighted
          '<rect x="233" y="10" width="32" height="32" rx="8" fill="rgba(74,222,128,0.15)" stroke="#4ade80" stroke-width="1.5"/>' +
          // Puzzle-piece icon (extensions)
          '<path d="M245 22h2v-2h4v2h2a1 1 0 0 1 1 1v3h-2v1a1 1 0 1 1-2 0v-1h-5v1a1 1 0 1 1-2 0v-1h-2v-3a1 1 0 0 1 1-1z" fill="#4ade80"/>' +
          // Arrow pointing to extension area
          '<path d="M226 26 L236 26" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3 2" stroke-linecap="round"/>' +
          '<path d="M232 22 L236 26 L232 30" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>' +
          // Label
          '<text x="249" y="48" font-family="DM Sans, sans-serif" font-size="9" fill="#4ade80" text-anchor="middle">extension icon</text>' +
          '</svg>';
      }

      // --- STATE B: Password reset ---
      function showPasswordReset() {
        content.innerHTML =
          '<h1>Reset your password</h1>' +
          '<p class="subtext" style="margin-bottom:28px">Choose a new password for your FutureSelf account.</p>' +
          '<form id="reset-form">' +
            '<div class="form-group">' +
              '<label for="pw-new">New password</label>' +
              '<input type="password" id="pw-new" placeholder="At least 8 characters" required>' +
            '</div>' +
            '<div class="form-group">' +
              '<label for="pw-confirm">Confirm password</label>' +
              '<input type="password" id="pw-confirm" placeholder="Repeat password" required>' +
            '</div>' +
            '<p id="pw-error" class="form-error" style="display:none"></p>' +
            '<button type="submit" class="btn btn-green" id="pw-submit">Save New Password</button>' +
          '</form>' +
          '<a href="../../index.html" class="back-link">Back to homepage</a>';

        document.getElementById('reset-form').addEventListener('submit', function (e) {
          e.preventDefault();
          var pw = document.getElementById('pw-new').value;
          var confirm = document.getElementById('pw-confirm').value;
          var errEl = document.getElementById('pw-error');
          var btn = document.getElementById('pw-submit');

          errEl.style.display = 'none';

          if (pw.length < 8) {
            errEl.textContent = 'Password must be at least 8 characters.';
            errEl.style.display = 'block';
            return;
          }

          if (pw !== confirm) {
            errEl.textContent = 'Passwords don\'t match.';
            errEl.style.display = 'block';
            return;
          }

          btn.disabled = true;
          btn.textContent = 'Saving…';

          sb.auth.updateUser({ password: pw }).then(function (res) {
            if (res.error) {
              errEl.textContent = res.error.message || 'Something went wrong. Please try again.';
              errEl.style.display = 'block';
              btn.disabled = false;
              btn.textContent = 'Save New Password';
            } else {
              content.innerHTML =
                '<span class="check-icon">&#10003;</span>' +
                '<h1 style="margin-bottom:16px">Password updated.</h1>' +
                '<p class="success-note">Go back to the extension and log in with your new password.</p>' +
                '<a href="../../index.html" class="back-link">Back to homepage</a>';
            }
          });
        });
      }

      // --- STATE C: Unknown / error ---
      function showUnknown() {
        content.innerHTML =
          '<h1 style="margin-bottom:12px">Something went wrong</h1>' +
          '<p class="subtext">We couldn\'t verify your link. It may have expired — try again from the extension.</p>' +
          '<a href="../../index.html" class="back-link">Back to homepage</a>';
      }

      // --- Main logic ---
      var params = getAuthParams();
      var type = params['type'] || '';

      // Supabase appends the session to the hash automatically on redirect.
      // getSession() picks it up after the JS SDK processes the URL fragment.
      sb.auth.getSession().then(function (res) {
        var session = res.data && res.data.session;

        if (type === 'recovery') {
          // Password reset flow — session must exist so updateUser works
          if (session) {
            showPasswordReset();
          } else {
            showUnknown();
          }
          return;
        }

        // type === 'signup', or access_token present with a valid session → email confirmed
        if (type === 'signup' || (session && params['access_token'])) {
          showSignupSuccess();
          return;
        }

        // Fallback: if we just got a valid session and no other type clue, treat as signup
        if (session) {
          showSignupSuccess();
          return;
        }

        showUnknown();
      }).catch(function () {
        showUnknown();
      });
    })();
  </script>
</body>
</html>
